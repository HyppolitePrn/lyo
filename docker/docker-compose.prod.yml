name: lyo-prod

services:
  # ── Application ──────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/hyppoliteprn/lyo-backend:latest
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Database ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lyo}
      POSTGRES_USER: ${POSTGRES_USER:-lyo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port NOT exposed externally in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lyo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Observability ─────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.0
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
