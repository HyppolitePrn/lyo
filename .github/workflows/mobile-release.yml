name: Mobile Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build signed APK & GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mobile/android/lyo.jks

      - name: Create key.properties
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=lyo.jks
          EOF

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUILD_NUM=${GITHUB_RUN_NUMBER}
          sed -i "s/^version:.*/version: $VERSION+$BUILD_NUM/" mobile/pubspec.yaml

      - name: Build signed release APK
        working-directory: mobile
        run: flutter build apk --release --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Build signed release AAB
        working-directory: mobile
        run: flutter build appbundle --release --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/bundle/release/app-release.aab
